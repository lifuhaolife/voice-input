# Voice Input Configuration

# Speech recognition backend: whisper, baidu, xunfei, tencent
backend: whisper

# Hotkey settings (press to start, release to stop)
hotkey:
  # Key combination to trigger recording
  # Examples: "alt", "ctrl+alt+v", "super+v"
  trigger: "alt"
  # Or use toggle mode: press to start, press again to stop
  mode: "hold"  # "hold" or "toggle"

# Recording settings
recording:
  sample_rate: 16000
  channels: 1
  # Max recording duration in seconds (0 = unlimited)
  max_duration: 60

# Whisper settings
whisper:
  # Model size: tiny, base, small, medium, large
  model: "small"
  # Language code (auto-detect if empty)
  language: "zh"
  # Use GPU if available
  device: "auto"  # "auto", "cuda", "cpu"

# Baidu API settings (for future use)
baidu:
  app_id: ""
  api_key: ""
  secret_key: ""

# Xunfei API settings (for future use)
xunfei:
  app_id: ""
  api_key: ""
  api_secret: ""

# Tencent API settings (for future use)
tencent:
  secret_id: ""
  secret_key: ""

# Notification settings
notification:
  enabled: true
  # Show notification when recording starts/stops
  show_status: true
  # Show recognized text in notification
  show_result: true

# Input settings
input:
  # Method to input text: "type" (simulate keystrokes) or "clipboard" (paste)
  method: "type"
  # Delay between keystrokes in seconds (for "type" method)
  type_delay: 0.01